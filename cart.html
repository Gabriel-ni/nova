    <!DOCTYPE html>
    <html>
    <head>
    <title>Shopping Cart</title>

    <style>
        
    body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
    }


    /* NAVBAR */
    .navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f04e23;
    padding:10px 20px;
    color:white;
    }

    .logo{
    font-size:1.5rem;
    font-weight:bold;
    cursor:pointer;
    }

    .navbar input{
    width:40%;
    padding:8px;
    border-radius:20px;
    border:none;
    }

    .nav-links{
    display:flex;
    gap:20px;
    align-items:center;
    }

    .profile-box{
    display:flex;
    gap:5px;
    cursor:pointer;
    }

    /* CART */
    .container{
    width:90%;
    margin:auto;
    margin-top:30px;
    }

    .cart-header{
    background:white;
    padding:15px;
    display:grid;
    grid-template-columns:50px 3fr 1fr 1fr 1fr 1fr;
    font-weight:bold;
    border-radius:6px;
    }

    .cart-item{
    background:white;
    padding:15px;
    margin-top:10px;
    display:grid;
    grid-template-columns:50px 3fr 1fr 1fr 1fr 1fr;
    align-items:center;
    border-radius:6px;
    }

    .product{
    display:flex;
    align-items:center;
    gap:10px;
    }

    .product img{
    width:60px;
    height:60px;
    object-fit:cover;
    }

    .qty-box{
    display:flex;
    align-items:center;
    gap:5px;
    }

    .qty-box button{
    width:30px;
    height:30px;
    border:1px solid #ccc;
    background:white;
    cursor:pointer;
    }

    .delete{
    color:red;
    cursor:pointer;
    }

    .checkout{
    background:white;
    margin-top:20px;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-radius:6px;
    }

    .checkout button{
    background:#ee4d2d;
    color:white;
    border:none;
    padding:10px 25px;
    cursor:pointer;
    font-size:16px;
    }
    </style>
    </head>

    <body>

    <!-- NAVBAR -->
    <div class="navbar">
    <div class="logo" onclick="goHome()">Nova</div>
    <input type="search" id="searchCart" placeholder="Search..." onkeyup="searchCart()">
    <!-- Search icon SVG -->
        
    <div class="nav-links">
        <div class="profile-box" onclick="openAccount()">👤 <span id="profileLink"></span></div>
        <div onclick="logout()">Logout</div>
    </div>
    </div>

    <!-- CART -->
    <div class="container">
    <h2>Shopping Cart</h2>

    <div class="cart-header">
    <div><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></div>
    <div>Product</div>
    <div>Unit Price</div>
    <div>Quantity</div>
    <div>Total Price</div>
    <div>Actions</div>
    </div>

    <div id="cartItems"></div>

    <div class="checkout">
    <div>Total: ₱<span id="grandTotal">0</span></div>
    <button onclick="checkout()">Check Out</button>
    </div>
    </div>

    <script>

    function toggleItem(index){
    let checkbox = document.querySelector(`.itemCheckbox[data-index="${index}"]`);
    checkbox.checked = !checkbox.checked;
    updateTotal();
    }

    /* NAVBAR FUNCTIONS */
    function goHome(){ window.location="shop.html"; }
    function openAccount(){ window.location="account.html"; }
    function logout(){
    if(confirm("Do you want to log out?")){
        localStorage.removeItem("currentUser");
        window.location="index.html";
    }
    }

    let currentUser = localStorage.getItem("currentUser");
    if(currentUser){ document.getElementById("profileLink").textContent=currentUser; }

    /* CART SYSTEM */
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function loadCart(list = cart){
    let cartItems = document.getElementById("cartItems");
    cartItems.innerHTML = "";

    list.forEach((item,i)=>{
        if(!item.qty) item.qty = 1;

        cartItems.innerHTML += `
       <div class="cart-item" data-index="${i}" onclick="toggleItem(${i})">
        <div><input type="checkbox" class="itemCheckbox" data-index="${i}" onclick="updateTotal()"></div>
        <div class="product"><img src="${item.img}"><span>${item.name}</span></div>
        <div class="unit-price">₱${item.price}</div>
        <div class="qty-box">
            <button onclick="event.stopPropagation(); minusQty(${i})">-</button>
            <span class="qty">${item.qty}</span>
            <button onclick="event.stopPropagation(); addQty(${i})">+</button>
        </div>
        <div class="total-price">₱${item.price * item.qty}</div>
        <div class="delete" onclick="event.stopPropagation(); removeItem(${i})">Delete</div>
        </div>`;
    });

    updateTotal();
    }

    /* SEARCH FUNCTION */
    function searchCart(){
    let input = document.getElementById("searchCart").value.toLowerCase();
    let filtered = cart.filter(item => item.name.toLowerCase().includes(input));
    loadCart(filtered);
    }

    /* CART CONTROLS - UPDATE IN PLACE */
    function addQty(i){
    cart[i].qty++;
    updateCartItem(i);
    }

    function minusQty(i){
    if(cart[i].qty>1){
        cart[i].qty--;
        updateCartItem(i);
    }
    }

    function updateCartItem(i){
    let itemDiv = document.querySelector(`.cart-item[data-index="${i}"]`);
    if(!itemDiv) return;
    itemDiv.querySelector(".qty").textContent = cart[i].qty;
    itemDiv.querySelector(".total-price").textContent = "₱" + (cart[i].price * cart[i].qty);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateTotal();
    }

    function removeItem(i){
    cart.splice(i,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
    }

    /* SELECT ALL CHECKBOX */
    function toggleSelectAll(checkbox){
    let checkboxes = document.querySelectorAll(".itemCheckbox");
    checkboxes.forEach(cb => cb.checked = checkbox.checked);
    updateTotal();
    }

    /* UPDATE TOTAL ONLY FOR SELECTED ITEMS */
    function updateTotal(){
    let total = 0;
    document.querySelectorAll(".itemCheckbox").forEach(cb => {
        if(cb.checked){
        let i = cb.getAttribute("data-index");
        total += cart[i].price * cart[i].qty;
        }
    });
    document.getElementById("grandTotal").textContent = total;

    // Keep select all in sync
    let all = document.querySelectorAll(".itemCheckbox");
    let checked = document.querySelectorAll(".itemCheckbox:checked");
    document.getElementById("selectAll").checked = (all.length === checked.length && all.length>0);
    }

    /* CHECKOUT ONLY SELECTED ITEMS */
    function checkout(){
  let selectedItems = [];

  document.querySelectorAll(".itemCheckbox").forEach(cb=>{
    if(cb.checked){
      selectedItems.push(cart[cb.getAttribute("data-index")]);
    }
  });

  if(selectedItems.length === 0){
    alert("Please select at least one item to checkout!");
    return;
  }

  // Save selected items for checkout page
  localStorage.setItem("checkoutItems", JSON.stringify(selectedItems));

  // Go to checkout page
  window.location = "checkout.html";
}

    loadCart();
    </script>
    </body>
    </html>
