<!DOCTYPE html>
    <html>
    <head>
    <title>Checkout</title>
    <style>

        
        body{
        margin:0; 
        font-family:Arial; 
        background:#f5f5f5; 
        }
        
  .container{
     width:90%; 
     margin:auto; 
     margin-top:30px; }



    h2{
    text-align:center;
    }

    .checkout-table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
    border-radius:6px;
    overflow:hidden;
    }

    .checkout-table th, .checkout-table td{
    padding:15px;
    text-align:left;
    border-bottom:1px solid #ddd;
    }

    .checkout-table th{
    background:#063378;
    color:white;
    }

    .payment-methods{
    margin-top:20px;
    background:white;
    padding:15px;
    border-radius:6px;
    }

    .payment-methods label{
    display:block;
    margin-bottom:10px;
    cursor:pointer;
    }

    .pay-btn{
    background:#063378;
    color:white;
    border:none;
    padding:10px 25px;
    cursor:pointer;
    font-size:16px;
    margin-top:15px;
    }
    </style>
    </head>
    <body>

    <div class="container">
    <h2>Checkout</h2>
    
    <table class="checkout-table" id="checkoutTable">
        <thead>
        <tr>
            <th>Product</th>
            <th>Unit Price</th>
            <th>Quantity</th>
            <th>Total</th>
        </tr>
        </thead>
        <tbody>
        <!-- Selected items will appear here -->
        </tbody>
    </table>

    <div class="payment-methods">
        <h3>Select Payment Method</h3>
        <label><input type="radio" name="payment" value="gcash" checked> GCash</label>
        <label><input type="radio" name="payment" value="paypal"> PayPal</label>
        <label><input type="radio" name="payment" value="credit"> Credit Card</label>

        <button class="pay-btn" onclick="payNow()">Pay Now</button>
    </div>
    </div>

    <script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let selectedItems = JSON.parse(localStorage.getItem("checkoutItems")) || [];

const tableBody = document.querySelector("#checkoutTable tbody");

function loadCheckout(){

tableBody.innerHTML="";
let grandTotal=0;

selectedItems.forEach(item=>{

let total=item.price * item.qty;
grandTotal+=total;

tableBody.innerHTML += `
<tr>
<td>${item.name}</td>
<td>₱${item.price}</td>
<td>${item.qty}</td>
<td>₱${total}</td>
</tr>
`;

});

tableBody.innerHTML += `
<tr>
<td colspan="3" style="text-align:right;font-weight:bold;">Grand Total:</td>
<td>₱${grandTotal}</td>
</tr>
`;

}

function payNow(){

let payment=document.querySelector('input[name="payment"]:checked').value;

alert(`Payment successful!
Method: ${payment}
Total Items: ${selectedItems.length}`);

selectedItems.forEach(item=>{

let index=cart.findIndex(c=>c.name===item.name && c.price===item.price);

if(index!==-1){
cart.splice(index,1);
}

});

localStorage.setItem("cart",JSON.stringify(cart));
localStorage.removeItem("checkoutItems");

window.location="shop.html";

}

if(selectedItems.length===0){

alert("No items selected! Redirecting to cart.");
window.location="cart.html";

}else{

loadCheckout();

}

</script>
    </body>
    </html>
