<!DOCTYPE html>
<html>
<head>
<title>My Account</title>
<style>
body{
  font-family:Arial;
  background:#f4f4f4;
}

.container{
  max-width:500px;
  margin:auto;
  background:white;
  padding:30px;
  margin-top:60px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.container h2{
  text-align:center;
}

.container p{
  margin-bottom:10px;
}

.container input{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#063378;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

button:hover{ background:#063378; }
</style>
</head>
<body>

<div class="container">

<h2>My Account</h2>

<p><b>Username:</b> <span id="username"></span></p>
<p><b>Email:</b> <input type="email" id="email" disabled></p>
<p><b>Contact:</b> <input type="text" id="contact" disabled></p>
<p><b>Address:</b> <input type="text" id="address" disabled></p>

<button id="editBtn" onclick="enableEdit()">Edit</button>
<button id="saveBtn" onclick="saveChanges()" style="display:none;">Save</button>
<button onclick="backShop()">Back to Shop</button>

</div>

<script>
let currentUser = localStorage.getItem("currentUser");
if(!currentUser){
  window.location = "index.html";
}

let data = JSON.parse(localStorage.getItem(currentUser));

// Load user data
document.getElementById("username").textContent = data.username;
document.getElementById("email").value = data.email;
document.getElementById("contact").value = data.contact;
document.getElementById("address").value = data.address;

// Enable edit mode
function enableEdit(){
  document.getElementById("email").disabled = false;
  document.getElementById("contact").disabled = false;
  document.getElementById("address").disabled = false;
  document.getElementById("editBtn").style.display = "none";
  document.getElementById("saveBtn").style.display = "block";
}

// Save changes
function saveChanges(){
  let email = document.getElementById("email").value.trim();
  let contact = document.getElementById("contact").value.trim();
  let address = document.getElementById("address").value.trim();

  if(!email || !contact || !address){
    alert("Please fill in all fields.");
    return;
  }

  if(contact.length !== 11 || isNaN(contact)){
    alert("Contact must be 11 digits.");
    return;
  }

  let emailPattern = /^[a-zA-Z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/;
  if(!email.match(emailPattern)){
    alert("Enter a valid email address.");
    return;
  }

  data.email = email;
  data.contact = contact;
  data.address = address;

  localStorage.setItem(currentUser, JSON.stringify(data));

  document.getElementById("email").disabled = true;
  document.getElementById("contact").disabled = true;
  document.getElementById("address").disabled = true;
  document.getElementById("editBtn").style.display = "block";
  document.getElementById("saveBtn").style.display = "none";

  alert("Information updated successfully!");
}

function backShop(){
  window.location = "shop.html";
}
</script>

</body>
</html>
